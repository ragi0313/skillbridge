name: Enhanced Session Monitoring

on:
  schedule:
    # Run every 5 minutes for more responsive monitoring
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  enhanced-session-monitoring:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run enhanced session monitoring
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        NODE_ENV: production
        # Add other environment variables as needed
      run: node -e "
        import('./lib/sessions/auto-session-monitor.js').then(async (module) => {
          const result = await module.runAutoSessionMonitor();
          console.log('Enhanced session monitoring result:', {
            timestamp: result.timestamp.toISOString(),
            sessionsChecked: result.sessionsChecked,
            noShowsProcessed: result.noShowsProcessed,
            expiredBookingsProcessed: result.expiredBookingsProcessed,
            statusUpdates: result.statusUpdates,
            errors: result.errors.length
          });
          if (result.errors.length > 0) {
            console.error('Errors encountered:', result.errors);
          }
          process.exit(0);
        }).catch(err => {
          console.error('Enhanced monitoring failed:', err);
          process.exit(1);
        });
      "